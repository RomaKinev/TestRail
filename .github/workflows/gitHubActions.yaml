name: TestRail Automation Pipeline

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:
  schedule:
    - cron: '0 */3 * * *'

permissions:
  contents: write

env:
  TESTRAIL_BASE_URL: https://supertester.testrail.io
  TESTRAIL_EMAIL: ${{ secrets.TR_LOGIN }}
  TESTRAIL_PASSWORD: ${{ secrets.TR_PASSWORD }}

jobs:
  api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run API tests
        run: >
          mvn clean test -Dsurefire.suiteXmlFiles=src/test/resources/api_tests_suit.xml
          -DbaseUrl="$TESTRAIL_BASE_URL" -Demail="$TESTRAIL_EMAIL" -Dpassword="$TESTRAIL_PASSWORD"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-api
          path: target/allure-results

  ui-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run UI smoke tests
        run: >
          mvn clean test -Dsurefire.suiteXmlFiles=src/test/resources/smoke_tests_suit.xml -Dheadless=true
          -DbaseUrl="$TESTRAIL_BASE_URL" -Demail="$TESTRAIL_EMAIL" -Dpassword="$TESTRAIL_PASSWORD"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-ui-smoke
          path: target/allure-results
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: ui-smoke-diagnostics
          path: build/reports/tests

  ui-regression:
    needs: ui-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run UI regression tests
        run: >
          mvn clean test -Dsurefire.suiteXmlFiles=src/test/resources/ui_tests_suit.xml -Dheadless=true
          -DbaseUrl="$TESTRAIL_BASE_URL" -Demail="$TESTRAIL_EMAIL" -Dpassword="$TESTRAIL_PASSWORD"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-ui-regression
          path: target/allure-results
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: ui-regression-diagnostics
          path: build/reports/tests

  report:
    needs: [ api-tests, ui-smoke, ui-regression ]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download all Allure results
        uses: actions/download-artifact@v4
        with:
          path: allure-results
          pattern: allure-*
          merge-multiple: true
      - name: Get Allure history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages
      - name: Generate Allure report
        id: generate
        uses: simple-elf/allure-report-action@v1.14
        if: always()
        with:
          allure_results: allure-results
          allure_history: allure-history
          gh_pages: gh-pages
          report_name: API, Smoke and Regression test suites
      - name: Deploy report to GitHub Pages
        if: always() && steps.generate.outcome == 'success'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history